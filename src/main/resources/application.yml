spring:
  application:
    name: risk-monitor

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5433/compliance_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # Auto-creates/updates tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: compliance-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # ElasticSearch
  elasticsearch:
    uris: http://localhost:9200

# Application-specific configs
app:
  kafka:
    topic:
      transactions: transactions-topic
  compliance:
    rules:
      high-amount-threshold: 10000.00      # Flag if amount > this
      velocity-max-transactions: 5          # Max transactions per window
      velocity-window-minutes: 10           # Time window in minutes
      suspicious-locations:                 # Flag these locations
        - "North Korea"
        - "Iran"
        - "Syria"
    risk-score:
      high-amount-weight: 40
      velocity-weight: 35
      suspicious-location-weight: 25
    generator:
      rate-ms: 5000   # Generate one transaction every 5 seconds

# Logging
logging:
  level:
    com.compliance: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8080

# Actuator (health check endpoint)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

